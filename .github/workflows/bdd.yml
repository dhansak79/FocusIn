name: BDD

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  bdd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Run Cucumber BDD scenarios
        run: npm run bdd
      - name: Upload cucumber report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: reports/cucumber/
