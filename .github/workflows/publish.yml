name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

jobs:
  mutation:
    uses: ./.github/workflows/mutation.yml

  bdd:
    uses: ./.github/workflows/bdd.yml

  publish:
    needs: [mutation, bdd]
    if: always() && needs.mutation.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Download mutation report artifact
        uses: actions/download-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
      - name: Download cucumber report artifact
        if: needs.bdd.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report
          path: reports/cucumber/
      - name: Generate guardrails dashboard
        run: node scripts/generate-guardrails-dashboard.js
      - name: Inject dashboard link into mutation report
        run: node scripts/inject-dashboard-link.js
      - name: Assemble Pages staging directory
        run: |
          mkdir -p reports/pages/insights reports/pages/cucumber
          cp -r reports/mutation/. reports/pages/
          cp reports/workflow-insights/index.html reports/pages/insights/index.html
          if [ -d reports/cucumber ] && [ "$(ls -A reports/cucumber 2>/dev/null)" ]; then
            cp -r reports/cucumber/. reports/pages/cucumber/
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/pages/

  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
